<!DOCTYPE html>
<html>
<head>
<title>Kitchen Recipes</title>

<style>
body{
    font-family: Arial;
    text-align: center;
    background-color: #fff8e1;
    margin: 0;
    transition: background-color 0.3s, color 0.3s;
}

.dark-mode {
    background-color: #1e1e1e;
    color: #f5f5f5;
}

h1{
    color: #e67e22;
    margin-top: 40px;
}

#backBtn {
    position: fixed;
    bottom: 20px;
    left: 20px;
    padding: 10px 20px;
    background-color: #555;
    color: white;
    border-radius: 5px;
}

#darkModeBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background-color: #555;
    color: white;
    padding: 10px 20px;
    border-radius: 5px;
}

#menu {
    margin-top: 30px;
}

.recipeBtn {
    padding: 12px 25px;
    margin: 10px;
    background-color: #e74c3c;
    color: white;
    border-radius: 6px;
    font-size: 14px;
}

.recipeBtn:hover {
    background-color: #c0392b;
}

#recipeBox {
    margin: 30px auto;
    padding: 20px;
    max-width: 500px;
    background-color: rgba(255,255,255,0.9);
    border-radius: 12px;
}

.dark-mode #recipeBox {
    background-color: #2c2c2c;
}

ul li {
    cursor: pointer;
}
ul li.checked {
    text-decoration: line-through;
    color: gray;
}

ol li {
    pointer-events: none;
    cursor: pointer;
}
ol li:first-child {
    pointer-events: auto;
}
ol li.completed {
    color: green;
    text-decoration: line-through;
}

#funFact {
    margin-top: 20px;
    font-style: italic;
}
</style>
</head>

<body>

<button id="backBtn" onclick="goBack()">Back</button>
<button id="darkModeBtn" onclick="toggleDarkMode()">Dark Mode</button>

<h1>🍳 Kitchen Recipes</h1>
<p>Choose a recipe and start cooking like a pro 👨‍🍳</p>

<p id="welcome"></p>

<div id="menu">
    <button class="recipeBtn" onclick="showRecipe('bolognese')">Bolognese</button>
    <button class="recipeBtn" onclick="showRecipe('carbonara')">Carbonara</button>
    <button class="recipeBtn" onclick="showRecipe('pesto')">Pesto</button>
    <button class="recipeBtn" onclick="showRecipe('chicken')">Chicken Rice</button>

    <h3 style="margin-top:30px;">🍰 Desserts</h3>
    <button class="recipeBtn" onclick="showRecipe('cake')">Chocolate Cake</button>
</div>

<div id="recipeBox">
    <p>Select a recipe 👆</p>
</div>

<p id="funFact"></p>

<script>
let user = localStorage.getItem("username");
if(user){
    document.getElementById("welcome").innerText = "Welcome, " + user + " 👨‍🍳";
}

function goBack(){
    window.location.href = "index.html";
}

function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
    localStorage.setItem("kitchenDarkMode", document.body.classList.contains("dark-mode"));
}

const funFacts = [
    "Spaghetti was first made in Italy over 500 years ago! 🍝",
    "Tomatoes are actually fruits 🍅",
    "Carbonara originally had no cream 😲"
];

function showFunFact(){
    const fact = funFacts[Math.floor(Math.random() * funFacts.length)];
    document.getElementById("funFact").innerText = "💡 " + fact;
}

function showRecipe(type){
    let content = "";
    let temp = 180;

    if(type === "bolognese"){
        temp = 180;
        content = recipeTemplate("🍝 Bolognese", 45, temp, `
            <li onclick="toggleCheck(this)">Spaghetti</li>
            <li onclick="toggleCheck(this)">Meat</li>
            <li onclick="toggleCheck(this)">Tomato sauce</li>
        `, `
            <li onclick="completeStep(this)">Boil pasta</li>
            <li onclick="completeStep(this)">Cook meat</li>
            <li onclick="completeStep(this)">Add sauce</li>
        `);
    }

    if(type === "carbonara"){
        temp = 160;
        content = recipeTemplate("🍝 Carbonara", 25, temp, `
            <li onclick="toggleCheck(this)">Spaghetti</li>
            <li onclick="toggleCheck(this)">Eggs</li>
            <li onclick="toggleCheck(this)">Bacon</li>
        `, `
            <li onclick="completeStep(this)">Boil pasta</li>
            <li onclick="completeStep(this)">Cook bacon</li>
            <li onclick="completeStep(this)">Mix all</li>
        `);
    }

    if(type === "pesto"){
        temp = 150;
        content = recipeTemplate("🍝 Pesto", 20, temp, `
            <li onclick="toggleCheck(this)">Spaghetti</li>
            <li onclick="toggleCheck(this)">Pesto</li>
        `, `
            <li onclick="completeStep(this)">Boil pasta</li>
            <li onclick="completeStep(this)">Add pesto</li>
        `);
    }

    if(type === "chicken"){
        temp = 200;
        content = recipeTemplate("🍗 Chicken Rice", 40, temp, `
            <li onclick="toggleCheck(this)">Chicken</li>
            <li onclick="toggleCheck(this)">Rice</li>
            <li onclick="toggleCheck(this)">Garlic</li>
            <li onclick="toggleCheck(this)">Soy sauce</li>
        `, `
            <li onclick="completeStep(this)">Cook rice</li>
            <li onclick="completeStep(this)">Cook chicken</li>
            <li onclick="completeStep(this)">Mix together</li>
            <li onclick="completeStep(this)">Serve hot</li>
        `);
    }

    if(type === "cake"){
        temp = 180;
        content = recipeTemplate("🍰 Chocolate Cake", 50, temp, `
            <li onclick="toggleCheck(this)">Flour</li>
            <li onclick="toggleCheck(this)">Sugar</li>
            <li onclick="toggleCheck(this)">Cocoa powder</li>
            <li onclick="toggleCheck(this)">Eggs</li>
        `, `
            <li onclick="completeStep(this)">Mix ingredients</li>
            <li onclick="completeStep(this)">Pour into pan</li>
            <li onclick="completeStep(this)">Bake</li>
            <li onclick="completeStep(this)">Let it cool</li>
        `);
    }

    document.getElementById("recipeBox").innerHTML = content;
    showFunFact();

    const slider = document.getElementById("ovenTemp");
    const output = document.getElementById("ovenValue");
    const feedback = document.getElementById("tempFeedback");

    slider.addEventListener("input", function(){
        const val = parseInt(this.value);
        output.innerText = val + "°C";

        if(val < temp - 10){
            feedback.innerText = "Too cold ❄️";
            feedback.style.color = "blue";
        } else if(val > temp + 10){
            feedback.innerText = "Too hot 🔥";
            feedback.style.color = "red";
        } else {
            feedback.innerText = "Perfect ✅";
            feedback.style.color = "green";
        }
    });
}

function recipeTemplate(title, time, temp, ingredients, steps){
    return `
        <h2>${title}</h2>
        <p>⏱️ ${time} min <button onclick="startTimer(${time})">Start</button> <span id="timer">0</span></p>

        <p>🔥 Temp: ${temp}°C</p>
        <input type="range" min="100" max="220" value="${temp}" id="ovenTemp">
        <span id="ovenValue">${temp}°C</span>
        <p id="tempFeedback"></p>

        <h3>Ingredients</h3>
        <ul>${ingredients}</ul>

        <h3>Steps</h3>
        <ol>${steps}</ol>
    `;
}

function toggleCheck(li){
    li.classList.toggle("checked");
}

function completeStep(li){
    li.classList.add("completed");
    let next = li.nextElementSibling;
    if(next) next.style.pointerEvents = "auto";
}

function startTimer(minutes){
    let time = minutes * 60;
    let timerDisplay = document.getElementById("timer");

    clearInterval(window.timerInterval);

    window.timerInterval = setInterval(() => {
        let mins = Math.floor(time / 60);
        let secs = time % 60;
        timerDisplay.innerText = mins + "m " + (secs<10?"0":"") + secs + "s";
        time--;

        if(time < 0){
            clearInterval(window.timerInterval);
            alert("⏰ Done!");
        }
    }, 1000);
}
</script>

</body>
</html>
