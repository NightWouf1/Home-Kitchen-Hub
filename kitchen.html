<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Recipes – Kitchen Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#fdf6ee; --bg2:#fff8f0; --text:#1a1208; --text2:#5a4a3a;
    --accent:#c8440a; --accent2:#e07b39;
    --card:#ffffff; --border:#e8d8c4; --shadow:rgba(180,100,40,0.12);
  }
  .dark {
    --bg:#16100a; --bg2:#1e160e; --text:#f5ede0; --text2:#b09070;
    --accent:#e8673a; --accent2:#f09050;
    --card:#221a10; --border:#3a2a1a; --shadow:rgba(0,0,0,0.4);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); transition:background 0.3s,color 0.3s; min-height:100vh; }
  nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:0 32px; height:64px; background:var(--bg); border-bottom:1px solid var(--border); }
  .nav-logo { font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:700; color:var(--accent); text-decoration:none; }
  .nav-links { display:flex; gap:8px; align-items:center; }
  .nav-links a { text-decoration:none; color:var(--text2); font-size:0.9rem; padding:6px 14px; border-radius:20px; transition:background 0.2s,color 0.2s; }
  .nav-links a:hover { background:var(--border); color:var(--text); }
  .nav-links a.active { background:var(--accent); color:white; }
  .nav-right { display:flex; gap:8px; align-items:center; }
  #darkBtn { background:var(--border); color:var(--text); border:none; border-radius:20px; padding:6px 14px; cursor:pointer; font-size:0.85rem; font-family:'DM Sans',sans-serif; transition:background 0.2s; }
  #darkBtn:hover { background:var(--accent); color:white; }
  #userChip { display:none; align-items:center; gap:8px; background:var(--bg2); border:1px solid var(--border); border-radius:20px; padding:4px 14px 4px 8px; font-size:0.85rem; }
  #userChip .avatar { width:26px; height:26px; border-radius:50%; background:var(--accent); color:white; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.75rem; }
  #logoutBtn { background:none; border:none; color:var(--text2); cursor:pointer; font-size:0.75rem; margin-left:4px; }
  .page { padding:88px 32px 64px; max-width:1200px; margin:0 auto; }
  .toolbar { display:flex; gap:12px; align-items:center; margin-bottom:28px; flex-wrap:wrap; }
  .search-wrap { position:relative; flex:1; min-width:200px; }
  .search-wrap input { width:100%; padding:10px 16px 10px 40px; border:1px solid var(--border); border-radius:12px; background:var(--card); color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.9rem; }
  .search-wrap input:focus { outline:none; border-color:var(--accent); }
  .search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text2); pointer-events:none; }
  .filter-group { display:flex; gap:8px; flex-wrap:wrap; }
  .filter-btn { padding:8px 16px; border-radius:20px; border:1px solid var(--border); background:var(--card); color:var(--text2); cursor:pointer; font-size:0.8rem; font-family:'DM Sans',sans-serif; transition:all 0.2s; }
  .filter-btn:hover, .filter-btn.active { background:var(--accent); color:white; border-color:var(--accent); }
  .page-header { margin-bottom:32px; }
  .page-header h1 { font-family:'Playfair Display',serif; font-size:2.2rem; margin-bottom:8px; }
  .page-header p { color:var(--text2); }
  .recipe-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; }
  .recipe-card { background:var(--card); border:1px solid var(--border); border-radius:16px; overflow:hidden; transition:transform 0.2s,box-shadow 0.2s; cursor:pointer; }
  .recipe-card:hover { transform:translateY(-4px); box-shadow:0 12px 40px var(--shadow); }
  .card-emoji { font-size:3rem; background:var(--bg2); display:block; text-align:center; padding:24px 0; position:relative; }
  .fav-btn { position:absolute; top:10px; right:12px; background:var(--card); border:1px solid var(--border); border-radius:50%; width:34px; height:34px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1rem; transition:all 0.2s; }
  .fav-btn:hover { background:var(--accent); border-color:var(--accent); }
  .fav-btn.active { background:#ffe0e0; border-color:#e04040; }
  .dark .fav-btn.active { background:#3a0808; border-color:#e04040; }
  .card-body { padding:16px 20px 20px; }
  .card-tags { display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
  .tag { font-size:0.7rem; padding:3px 10px; border-radius:10px; font-weight:500; text-transform:uppercase; letter-spacing:0.05em; }
  .tag-cuisine { background:#fde8d8; color:#c8440a; }
  .dark .tag-cuisine { background:#3a1a08; color:#e8673a; }
  .tag-easy { background:#d8f5e8; color:#1a7a40; }
  .dark .tag-easy { background:#0a2a18; color:#4aaa70; }
  .tag-medium { background:#fff3d8; color:#a07000; }
  .dark .tag-medium { background:#2a1e00; color:#d4aa40; }
  .tag-hard { background:#fde0e0; color:#a02020; }
  .dark .tag-hard { background:#2a0808; color:#e05050; }
  .card-title { font-family:'Playfair Display',serif; font-size:1.15rem; margin-bottom:6px; }
  .card-meta { display:flex; gap:14px; font-size:0.8rem; color:var(--text2); }
  .detail-panel { display:none; position:fixed; top:64px; right:0; bottom:0; width:420px; background:var(--card); border-left:1px solid var(--border); overflow-y:auto; z-index:90; padding:28px; }
  .detail-panel.open { display:block; }
  .detail-close { position:absolute; top:16px; right:16px; background:var(--border); border:none; border-radius:50%; width:32px; height:32px; cursor:pointer; font-size:1rem; color:var(--text); display:flex; align-items:center; justify-content:center; }
  .detail-emoji { font-size:3.5rem; margin-bottom:12px; display:block; }
  .detail-title { font-family:'Playfair Display',serif; font-size:1.8rem; margin-bottom:8px; }
  .detail-meta { display:flex; gap:14px; color:var(--text2); font-size:0.85rem; margin-bottom:16px; flex-wrap:wrap; }
  .divider { border:none; border-top:1px solid var(--border); margin:20px 0; }
  .scaler { display:flex; align-items:center; gap:12px; background:var(--bg2); border-radius:12px; padding:12px 16px; margin-bottom:20px; }
  .scaler label { font-size:0.85rem; font-weight:500; flex:1; }
  .scaler-btns { display:flex; align-items:center; gap:8px; }
  .scaler-btn { width:28px; height:28px; border-radius:50%; background:var(--accent); color:white; border:none; cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; }
  #servingNum { font-weight:700; font-size:1rem; min-width:24px; text-align:center; }
  .section-label { font-family:'Playfair Display',serif; font-size:1.1rem; margin-bottom:12px; }
  .ing-list { list-style:none; }
  .ing-list li { padding:8px 0; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; cursor:pointer; font-size:0.9rem; }
  .ing-list li:last-child { border-bottom:none; }
  .ing-list li.checked { text-decoration:line-through; color:var(--text2); }
  .ing-check { width:18px; height:18px; border-radius:4px; border:1.5px solid var(--border); flex-shrink:0; transition:all 0.2s; }
  .ing-list li.checked .ing-check { background:var(--accent); border-color:var(--accent); }
  .ing-amt { font-weight:500; color:var(--accent); min-width:60px; }
  .step-list { list-style:none; }
  .step-item { display:flex; gap:14px; padding:12px 0; border-bottom:1px solid var(--border); cursor:pointer; }
  .step-item:last-child { border-bottom:none; }
  .step-item.done { opacity:0.5; }
  .step-num { width:28px; height:28px; border-radius:50%; background:var(--accent); color:white; display:flex; align-items:center; justify-content:center; font-size:0.8rem; font-weight:700; flex-shrink:0; }
  .step-item.done .step-num { background:var(--border); }
  .step-text { font-size:0.9rem; line-height:1.6; }
  .timer-bar { background:var(--bg2); border-radius:12px; padding:12px 16px; display:flex; align-items:center; gap:12px; margin-top:20px; }
  .timer-bar .timer-display { font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:700; color:var(--accent); }
  .timer-bar button { padding:6px 14px; border-radius:10px; border:none; cursor:pointer; font-size:0.8rem; font-family:'DM Sans',sans-serif; font-weight:500; }
  .rating-widget { margin:20px 0; }
  .rating-stars { display:flex; gap:4px; margin-bottom:8px; }
  .star-btn { background:none; border:none; font-size:1.5rem; cursor:pointer; line-height:1; }
  .star-btn:hover { transform:scale(1.2); }
  .rating-avg { font-size:0.85rem; color:var(--text2); }
  .shop-bar { background:var(--bg2); border-radius:12px; padding:14px 16px; margin-top:16px; display:flex; align-items:center; justify-content:space-between; }
  .shop-bar p { font-size:0.85rem; color:var(--text2); }
  .shop-btn { padding:7px 14px; background:var(--accent); color:white; border:none; border-radius:8px; cursor:pointer; font-size:0.8rem; font-family:'DM Sans',sans-serif; }
  .btn { display:inline-flex; align-items:center; padding:8px 18px; border-radius:20px; border:none; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:0.875rem; font-weight:500; transition:all 0.2s; }
  .btn-primary { background:var(--accent); color:white; }
  .btn-primary:hover { background:var(--accent2); }
  .btn-ghost { background:transparent; color:var(--text2); border:1px solid var(--border); }
  .btn-ghost:hover { border-color:var(--accent); color:var(--accent); }
  .modal-overlay { display:none; position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); align-items:center; justify-content:center; padding:20px; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--card); border-radius:20px; max-width:560px; width:100%; max-height:90vh; overflow-y:auto; padding:36px; position:relative; }
  .modal-close { position:absolute; top:16px; right:16px; background:var(--border); border:none; border-radius:50%; width:32px; height:32px; cursor:pointer; font-size:1rem; color:var(--text); display:flex; align-items:center; justify-content:center; }
  .modal h2 { font-family:'Playfair Display',serif; font-size:1.5rem; margin-bottom:8px; }
  .modal p { color:var(--text2); margin-bottom:20px; font-size:0.9rem; }
  .form-group { margin-bottom:14px; }
  .form-group label { display:block; font-size:0.85rem; font-weight:500; margin-bottom:6px; color:var(--text2); }
  .form-group input, .form-group select, .form-group textarea { width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.9rem; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline:none; border-color:var(--accent); }
  .form-group textarea { resize:vertical; min-height:80px; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .msg { font-size:0.85rem; padding:10px 14px; border-radius:10px; margin-top:12px; }
  .msg-success { background:#d8f5e8; color:#1a7a40; }
  .msg-error { background:#fde0e0; color:#a02020; }
  .shop-list { list-style:none; }
  .shop-list li { padding:8px 0; border-bottom:1px solid var(--border); font-size:0.9rem; display:flex; justify-content:space-between; align-items:center; }
  .shop-list li:last-child { border-bottom:none; }
  .shop-list li button { background:none; border:none; color:var(--text2); cursor:pointer; font-size:1rem; }
  .shop-section-title { font-size:0.75rem; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:var(--text2); margin:16px 0 8px; }
  .empty { text-align:center; padding:80px 20px; color:var(--text2); }
  .empty-icon { font-size:3rem; margin-bottom:16px; }
  .tab-bar { display:flex; gap:8px; margin-bottom:24px; }
  .tab-btn { padding:8px 20px; border-radius:20px; border:1px solid var(--border); background:var(--card); color:var(--text2); cursor:pointer; font-size:0.875rem; font-family:'DM Sans',sans-serif; transition:all 0.2s; }
  .tab-btn.active { background:var(--accent); color:white; border-color:var(--accent); }
  footer { text-align:center; padding:32px; border-top:1px solid var(--border); color:var(--text2); font-size:0.85rem; margin-top:40px; }
  footer a { color:var(--accent); text-decoration:none; }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">🍴 Kitchen Hub</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="kitchen.html" class="active">Recipes</a>
    <a href="planner.html">Meal Planner</a>
  </div>
  <div class="nav-right">
    <button id="darkBtn" onclick="toggleDark()">🌙 Dark</button>
    <div id="userChip">
      <div class="avatar" id="avatarLetter">J</div>
      <span id="chipName">User</span>
      <button id="logoutBtn" onclick="logout()">✕</button>
    </div>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <h1>🍳 All Recipes</h1>
    <p>Search, filter, and cook something delicious.</p>
  </div>
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="searchInput" placeholder="Search recipes..." oninput="renderGrid()">
    </div>
    <div class="filter-group">
      <button class="filter-btn active" data-filter="all" onclick="setFilter(this,'cuisine')">All</button>
      <button class="filter-btn" data-filter="Italian" onclick="setFilter(this,'cuisine')">🇮🇹 Italian</button>
      <button class="filter-btn" data-filter="American" onclick="setFilter(this,'cuisine')">🍔 American</button>
      <button class="filter-btn" data-filter="Baking" onclick="setFilter(this,'cuisine')">🧁 Baking</button>
    </div>
    <div class="filter-group">
      <button class="filter-btn active" data-filter="all" onclick="setFilter(this,'diff')">All Levels</button>
      <button class="filter-btn" data-filter="Easy" onclick="setFilter(this,'diff')">Easy</button>
      <button class="filter-btn" data-filter="Medium" onclick="setFilter(this,'diff')">Medium</button>
      <button class="filter-btn" data-filter="Hard" onclick="setFilter(this,'diff')">Hard</button>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="setTab(this,'all')">All Recipes</button>
    <button class="tab-btn" onclick="setTab(this,'favs')">❤️ Favourites</button>
    <button class="tab-btn" onclick="setTab(this,'mine')">✍️ My Recipes</button>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
    <span id="recipeCountLabel" style="font-size:0.85rem;color:var(--text2);"></span>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-ghost" style="font-size:0.8rem;" onclick="openModal('shopModal')">🛒 Shopping List</button>
      <button class="btn btn-primary" style="font-size:0.8rem;" onclick="openModal('submitModal')">+ Submit Recipe</button>
    </div>
  </div>
  <div class="recipe-grid" id="recipeGrid"></div>
</div>

<div class="detail-panel" id="detailPanel">
  <button class="detail-close" onclick="closeDetail()">✕</button>
  <div id="detailContent"></div>
</div>

<!-- SUBMIT MODAL -->
<div class="modal-overlay" id="submitModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('submitModal')">✕</button>
    <h2>Submit a Recipe</h2>
    <p>Share your favourite dish.</p>
    <div class="form-row">
      <div class="form-group"><label>Recipe Name *</label><input id="rName" placeholder="e.g. My Lasagna"></div>
      <div class="form-group"><label>Emoji</label><input id="rEmoji" placeholder="🍝" maxlength="2" value="🍽️"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Cuisine *</label>
        <select id="rCuisine"><option value="Italian">Italian</option><option value="American">American</option><option value="Baking">Baking</option><option value="Other">Other</option></select>
      </div>
      <div class="form-group"><label>Difficulty *</label>
        <select id="rDiff"><option value="Easy">Easy</option><option value="Medium">Medium</option><option value="Hard">Hard</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Cook Time (min) *</label><input id="rTime" type="number" placeholder="30" min="1"></div>
      <div class="form-group"><label>Base Servings</label><input id="rServings" type="number" placeholder="4" min="1"></div>
    </div>
    <div class="form-group"><label>Ingredients * <span style="font-weight:300;font-size:0.8rem;">(one per line, e.g. "2 eggs")</span></label>
      <textarea id="rIngredients" placeholder="200g pasta&#10;2 eggs&#10;100g bacon"></textarea>
    </div>
    <div class="form-group"><label>Steps * <span style="font-weight:300;font-size:0.8rem;">(one per line)</span></label>
      <textarea id="rSteps" placeholder="Boil the pasta&#10;Cook the bacon&#10;Mix everything together"></textarea>
    </div>
    <div class="form-group"><label>Fun Fact <span style="font-weight:300;font-size:0.8rem;">(optional)</span></label>
      <input id="rFact" placeholder="Did you know...">
    </div>
    <div style="display:flex;gap:10px;margin-top:4px;">
      <button class="btn btn-primary" onclick="submitRecipe()" style="flex:1">Submit Recipe</button>
      <button class="btn btn-ghost" onclick="closeModal('submitModal')">Cancel</button>
    </div>
    <div id="submitMsg"></div>
  </div>
</div>

<!-- SHOPPING LIST MODAL -->
<div class="modal-overlay" id="shopModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('shopModal')">✕</button>
    <h2>🛒 Shopping List</h2>
    <p>Ingredients added from recipes.</p>
    <div id="shopListContent"></div>
    <div style="display:flex;gap:10px;margin-top:20px;">
      <button class="btn btn-primary" onclick="copyShopList()" style="flex:1">📋 Copy List</button>
      <button class="btn btn-ghost" onclick="clearShopList()">Clear All</button>
    </div>
    <div id="shopMsg"></div>
  </div>
</div>

<footer>
  <p>Made with ❤️ · <a href="index.html">Home</a> · <a href="planner.html">Meal Planner</a></p>
</footer>

<script>
function toggleDark() {
  const d = document.body.classList.toggle('dark');
  localStorage.setItem('dark', d);
  document.getElementById('darkBtn').textContent = d ? '☀️ Light' : '🌙 Dark';
}
if (localStorage.getItem('dark') === 'true') {
  document.body.classList.add('dark');
  document.getElementById('darkBtn').textContent = '☀️ Light';
}
function updateAuthUI() {
  const user = localStorage.getItem('username');
  const chip = document.getElementById('userChip');
  if (user) { chip.style.display='flex'; document.getElementById('avatarLetter').textContent=user[0].toUpperCase(); document.getElementById('chipName').textContent=user; }
  else chip.style.display='none';
}
function logout() { updateAuthUI(); }
updateAuthUI();
function openModal(id) { document.getElementById(id).classList.add('open'); if(id==='shopModal') renderShopList(); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if(e.target===o) o.classList.remove('open'); }));

const BASE_RECIPES = [
  { id:'carbonara', emoji:'🍝', title:'Spaghetti Carbonara', cuisine:'Italian', diff:'Medium', time:25, servings:2, desc:'A classic Roman pasta dish with eggs, cheese, and crispy bacon — no cream needed.', fact:'Carbonara was popularized in Rome after WWII, with no cream ever in the original recipe.', ingredients:[{amt:'200g',name:'spaghetti'},{amt:'2',name:'eggs'},{amt:'100g',name:'guanciale or bacon'},{amt:'50g',name:'Pecorino Romano'},{amt:'1 tsp',name:'black pepper'}], steps:['Boil salted water and cook spaghetti al dente.','Fry the guanciale until crispy.','Beat eggs with grated Pecorino and black pepper.','Take pasta off heat, mix in egg mixture quickly.','Add pasta water to make it creamy. Serve immediately.'] },
  { id:'bolognese', emoji:'🍝', title:'Bolognese', cuisine:'Italian', diff:'Easy', time:60, servings:4, desc:'Rich slow-cooked meat sauce from Bologna.', fact:'The original Bolognese from 1982 contains no garlic, and uses very little tomato.', ingredients:[{amt:'400g',name:'spaghetti'},{amt:'300g',name:'minced beef'},{amt:'1',name:'onion, finely diced'},{amt:'2',name:'carrots, finely diced'},{amt:'400g',name:'crushed tomatoes'},{amt:'100ml',name:'red wine'}], steps:['Fry onion and carrot until soft, about 8 min.','Add mince, cook until browned.','Pour in wine, simmer 5 min.','Add tomatoes, season, simmer 40 min on low heat.','Cook pasta and serve with sauce on top.'] },
  { id:'pesto', emoji:'🌿', title:'Pesto Pasta', cuisine:'Italian', diff:'Easy', time:15, servings:2, desc:'The quickest Italian dinner you can make.', fact:'Traditional Ligurian pesto uses a marble mortar, never a blender.', ingredients:[{amt:'200g',name:'spaghetti or trofie'},{amt:'4 tbsp',name:'pesto'},{amt:'30g',name:'Parmesan, grated'},{amt:'handful',name:'cherry tomatoes'}], steps:['Cook pasta in salted water until al dente.','Reserve a cup of pasta water.','Drain pasta, toss with pesto and pasta water.','Serve with Parmesan and halved cherry tomatoes.'] },
  { id:'lasagna', emoji:'🫕', title:'Classic Lasagna', cuisine:'Italian', diff:'Hard', time:90, servings:6, desc:'Layers of pasta, rich bolognese, creamy béchamel, and melted cheese.', fact:'Lasagna is one of the oldest pasta dishes in Italy, dating back to the Middle Ages.', ingredients:[{amt:'12',name:'lasagna sheets'},{amt:'500g',name:'minced beef'},{amt:'400g',name:'crushed tomatoes'},{amt:'500ml',name:'béchamel sauce'},{amt:'200g',name:'mozzarella'},{amt:'1',name:'onion'}], steps:['Make bolognese: fry onion, brown mince, add tomatoes, simmer 30 min.','Make béchamel: melt butter, whisk in flour, add warm milk slowly.','Preheat oven to 190°C.','Layer: pasta → bolognese → béchamel → cheese. Repeat 3 times.','Bake 35–40 min until golden and bubbling. Rest 10 min before serving.'] },

let allRecipes = [];
let currentTab = 'all';
let filters = { cuisine:'all', diff:'all' };
let currentRecipeId = null;
let currentServings = 1;
let baseServings = 1;

function loadAllRecipes() {
  const custom = JSON.parse(localStorage.getItem('customRecipes') || '[]');
  allRecipes = [...BASE_RECIPES, ...custom];
}
function setFilter(btn, type) {
  document.querySelectorAll(`[data-filter][onclick*="${type}"]`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filters[type] = btn.dataset.filter;
  renderGrid();
}
function setTab(btn, tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTab = tab;
  renderGrid();
}
function getFilteredRecipes() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const favs = JSON.parse(localStorage.getItem('favs') || '[]');
  const custom = JSON.parse(localStorage.getItem('customRecipes') || '[]');
  return allRecipes.filter(r => {
    if (currentTab === 'favs' && !favs.includes(r.id)) return false;
    if (currentTab === 'mine' && !custom.find(c => c.id === r.id)) return false;
    if (filters.cuisine !== 'all' && r.cuisine !== filters.cuisine) return false;
    if (filters.diff !== 'all' && r.diff !== filters.diff) return false;
    if (q && !r.title.toLowerCase().includes(q) && !r.cuisine.toLowerCase().includes(q)) return false;
    return true;
  });
}
function diffTag(d) {
  const map = { Easy:'easy', Medium:'medium', Hard:'hard' };
  return `<span class="tag tag-${map[d]||'easy'}">${d}</span>`;
}
function getStars(id) {
  const ratings = JSON.parse(localStorage.getItem('ratings') || '{}');
  const arr = ratings[id] || [];
  if (!arr.length) return { avg:0, count:0 };
  return { avg:(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1), count:arr.length };
}
function renderGrid() {
  const recipes = getFilteredRecipes();
  const favs = JSON.parse(localStorage.getItem('favs') || '[]');
  const grid = document.getElementById('recipeGrid');
  document.getElementById('recipeCountLabel').textContent = `${recipes.length} recipe${recipes.length!==1?'s':''}`;
  if (!recipes.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🔍</div><p>No recipes found.</p></div>`;
    return;
  }
  grid.innerHTML = recipes.map(r => {
    const isFav = favs.includes(r.id);
    const { avg, count } = getStars(r.id);
    return `
      <div class="recipe-card" onclick="openDetail('${r.id}')">
        <span class="card-emoji">${r.emoji}
          <button class="fav-btn ${isFav?'active':''}" onclick="toggleFav(event,'${r.id}')">${isFav?'❤️':'🤍'}</button>
        </span>
        <div class="card-body">
          <div class="card-tags"><span class="tag tag-cuisine">${r.cuisine}</span>${diffTag(r.diff)}</div>
          <div class="card-title">${r.title}</div>
          <div class="card-meta">
            <span>⏱ ${r.time} min</span><span>👤 ${r.servings||2}</span>
            ${count>0?`<span style="color:#f0a030">${'★'.repeat(Math.round(avg))}${'☆'.repeat(5-Math.round(avg))}</span>`:''}
          </div>
        </div>
      </div>`;
  }).join('');
}
function toggleFav(e, id) {
  e.stopPropagation();
  const favs = JSON.parse(localStorage.getItem('favs') || '[]');
  const i = favs.indexOf(id);
  if (i===-1) favs.push(id); else favs.splice(i,1);
  localStorage.setItem('favs', JSON.stringify(favs));
  renderGrid();
}
function openDetail(id) {
  currentRecipeId = id;
  const r = allRecipes.find(x => x.id===id);
  if (!r) return;
  baseServings = r.servings||2;
  currentServings = baseServings;
  renderDetail(r);
  document.getElementById('detailPanel').classList.add('open');
}
function closeDetail() { document.getElementById('detailPanel').classList.remove('open'); currentRecipeId=null; }
function renderDetail(r) {
  const favs = JSON.parse(localStorage.getItem('favs') || '[]');
  const isFav = favs.includes(r.id);
  const userRating = getUserRating(r.id);
  const { avg, count } = getStars(r.id);
  const ratio = currentServings / baseServings;
  document.getElementById('detailContent').innerHTML = `
    <span class="detail-emoji">${r.emoji}</span>
    <div class="detail-title">${r.title}</div>
    <div class="detail-meta"><span>⏱ ${r.time} min</span><span>🍽 ${r.cuisine}</span>${diffTag(r.diff)}</div>
    <p style="color:var(--text2);font-size:0.9rem;margin-bottom:16px;line-height:1.6;">${r.desc||''}</p>
    <button onclick="toggleFav(event,'${r.id}')" style="background:${isFav?'#ffe0e0':'var(--bg2)'};border:1px solid ${isFav?'#e04040':'var(--border)'};border-radius:10px;padding:7px 14px;cursor:pointer;font-size:0.85rem;color:${isFav?'#a02020':'var(--text2)'};">
      ${isFav?'❤️ Saved':'🤍 Save Recipe'}
    </button>
    <hr class="divider">
    <div class="rating-widget">
      <div class="section-label">⭐ Rate this Recipe</div>
      <div class="rating-stars">${[1,2,3,4,5].map(n=>`<button class="star-btn" onclick="rateRecipe('${r.id}',${n})">${n<=userRating?'★':'☆'}</button>`).join('')}</div>
      <div class="rating-avg">${count>0?`Average: ${avg}/5 from ${count} rating${count!==1?'s':''}`:' Be the first to rate!'}</div>
    </div>
    <hr class="divider">
    <div class="scaler">
      <label>🍽 Servings</label>
      <div class="scaler-btns">
        <button class="scaler-btn" onclick="changeServings(-1)">−</button>
        <span id="servingNum">${currentServings}</span>
        <button class="scaler-btn" onclick="changeServings(1)">+</button>
      </div>
    </div>
    <div class="section-label">🛒 Ingredients</div>
    <ul class="ing-list" id="ingList">
      ${r.ingredients.map((ing,i)=>`
        <li onclick="this.classList.toggle('checked')">
          <div class="ing-check"></div>
          <span class="ing-amt" data-base="${ing.amt}" data-index="${i}">${scaleAmount(ing.amt,ratio)}</span>
          <span>${ing.name}</span>
        </li>`).join('')}
    </ul>
    <div class="shop-bar">
      <p>Add all to shopping list</p>
      <button class="shop-btn" onclick="addToShopList('${r.id}')">+ Add to List</button>
    </div>
    <hr class="divider">
    <div class="section-label">📋 Steps</div>
    <ol class="step-list">
      ${r.steps.map((s,i)=>`
        <li class="step-item" onclick="this.classList.toggle('done')">
          <div class="step-num">${i+1}</div>
          <div class="step-text">${s}</div>
        </li>`).join('')}
    </ol>
    <div class="timer-bar">
      <span>⏱</span>
      <span class="timer-display" id="timerDisplay">${r.time}:00</span>
      <button onclick="startTimer(${r.time})" style="background:var(--accent);color:white;border-radius:8px;">Start</button>
      <button onclick="stopTimer()" style="background:var(--border);color:var(--text);border-radius:8px;">Stop</button>
    </div>
    ${r.fact?`<div style="background:var(--bg2);border-radius:12px;padding:14px 16px;margin-top:20px;font-size:0.85rem;color:var(--text2);font-style:italic;">💡 ${r.fact}</div>`:''}
  `;
}
function changeServings(delta) {
  const r = allRecipes.find(x => x.id===currentRecipeId);
  if (!r) return;
  currentServings = Math.max(1, currentServings+delta);
  document.getElementById('servingNum').textContent = currentServings;
  const ratio = currentServings/baseServings;
  document.querySelectorAll('.ing-amt').forEach(el => { el.textContent = scaleAmount(el.dataset.base, ratio); });
}
function scaleAmount(amt, ratio) {
  if (ratio===1) return amt;
  const match = amt.match(/^([\d.\/]+)\s*(.*)/);
  if (!match) return amt;
  let num = match[1].includes('/') ? eval(match[1]) : parseFloat(match[1]);
  const scaled = Math.round(num*ratio*10)/10;
  return scaled + (match[2] ? ' '+match[2] : '');
}
function getUserRating(id) { return JSON.parse(localStorage.getItem('myRatings')||'{}')[id]||0; }
function rateRecipe(id, val) {
  const user = localStorage.getItem('username');
  if (!user) { alert('Log in to rate recipes!'); return; }
  const myRatings = JSON.parse(localStorage.getItem('myRatings')||'{}');
  const ratings = JSON.parse(localStorage.getItem('ratings')||'{}');
  const prev = myRatings[id]||0;
  myRatings[id] = val;
  if (!ratings[id]) ratings[id]=[];
  if (prev) { const idx=ratings[id].indexOf(prev); if(idx>-1) ratings[id].splice(idx,1); }
  ratings[id].push(val);
  localStorage.setItem('myRatings', JSON.stringify(myRatings));
  localStorage.setItem('ratings', JSON.stringify(ratings));
  const r = allRecipes.find(x => x.id===id);
  if (r) renderDetail(r);
  renderGrid();
}
function addToShopList(id) {
  const r = allRecipes.find(x => x.id===id);
  if (!r) return;
  const shop = JSON.parse(localStorage.getItem('shopList')||'{}');
  if (!shop[r.title]) shop[r.title]=[];
  const ratio = currentServings/baseServings;
  r.ingredients.forEach(ing => { const text=`${scaleAmount(ing.amt,ratio)} ${ing.name}`; if(!shop[r.title].includes(text)) shop[r.title].push(text); });
  localStorage.setItem('shopList', JSON.stringify(shop));
  alert(`✅ Added ${r.ingredients.length} ingredients to your shopping list!`);
}
function renderShopList() {
  const shop = JSON.parse(localStorage.getItem('shopList')||'{}');
  const content = document.getElementById('shopListContent');
  const keys = Object.keys(shop);
  if (!keys.length) { content.innerHTML='<p style="color:var(--text2);text-align:center;padding:20px 0;">Your list is empty. Open a recipe and click "+ Add to List".</p>'; return; }
  content.innerHTML = keys.map(title=>`
    <div class="shop-section-title">${title}</div>
    <ul class="shop-list">${shop[title].map(item=>`<li>${item} <button onclick="removeShopItem('${title}','${item.replace(/'/g,"\\'")}')" title="Remove">×</button></li>`).join('')}</ul>
  `).join('');
}
function removeShopItem(title, item) {
  const shop = JSON.parse(localStorage.getItem('shopList')||'{}');
  if (!shop[title]) return;
  shop[title] = shop[title].filter(i=>i!==item);
  if (!shop[title].length) delete shop[title];
  localStorage.setItem('shopList', JSON.stringify(shop));
  renderShopList();
}
function clearShopList() { if(confirm('Clear the entire shopping list?')) { localStorage.removeItem('shopList'); renderShopList(); } }
function copyShopList() {
  const shop = JSON.parse(localStorage.getItem('shopList')||'{}');
  let text = '🛒 Shopping List\n\n';
  Object.entries(shop).forEach(([title,items]) => { text+=`${title}:\n${items.map(i=>`  • ${i}`).join('\n')}\n\n`; });
  navigator.clipboard.writeText(text).then(() => { document.getElementById('shopMsg').innerHTML='<div class="msg msg-success">Copied!</div>'; setTimeout(()=>document.getElementById('shopMsg').innerHTML='',2000); });
}
let timerInterval;
function startTimer(min) {
  clearInterval(timerInterval);
  let secs = min*60;
  const display = document.getElementById('timerDisplay');
  timerInterval = setInterval(() => {
    const m=Math.floor(secs/60), s=secs%60;
    if(display) display.textContent=`${m}:${s<10?'0':''}${s}`;
    secs--;
    if(secs<0) { clearInterval(timerInterval); if(display) display.textContent='Done! ⏰'; alert('⏰ Timer done!'); }
  }, 1000);
}
function stopTimer() { clearInterval(timerInterval); }
function submitRecipe() {
  const name=document.getElementById('rName').value.trim();
  const emoji=document.getElementById('rEmoji').value.trim()||'🍽️';
  const cuisine=document.getElementById('rCuisine').value;
  const diff=document.getElementById('rDiff').value;
  const time=parseInt(document.getElementById('rTime').value);
  const servings=parseInt(document.getElementById('rServings').value)||2;
  const ingText=document.getElementById('rIngredients').value.trim();
  const stepsText=document.getElementById('rSteps').value.trim();
  const fact=document.getElementById('rFact').value.trim();
  const msg=document.getElementById('submitMsg');
  if (!name||!ingText||!stepsText||!time) { msg.innerHTML='<div class="msg msg-error">Please fill in all required fields.</div>'; return; }
  const ingredients=ingText.split('\n').filter(Boolean).map(line=>{ const m=line.match(/^([\d.\/]+\s*\w+)\s+(.+)/); return m?{amt:m[1],name:m[2]}:{amt:'',name:line}; });
  const steps=stepsText.split('\n').filter(Boolean);
  const recipe={ id:'custom_'+Date.now(), emoji, title:name, cuisine, diff, time, servings, desc:`A custom recipe submitted by ${localStorage.getItem('username')||'a user'}.`, fact, ingredients, steps };
  const custom=JSON.parse(localStorage.getItem('customRecipes')||'[]');
  custom.push(recipe);
  localStorage.setItem('customRecipes', JSON.stringify(custom));
  loadAllRecipes(); renderGrid();
  msg.innerHTML='<div class="msg msg-success">Recipe submitted! 🎉</div>';
  setTimeout(()=>{ closeModal('submitModal'); msg.innerHTML=''; }, 1500);
}
loadAllRecipes();
renderGrid();
const urlParams = new URLSearchParams(window.location.search);
const openId = urlParams.get('r');
if (openId) { setTimeout(()=>openDetail(openId), 300); }
</script>
