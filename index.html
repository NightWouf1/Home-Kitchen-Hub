<!DOCTYPE html>
<html>
<head>
<title>Home Kitchen Hub</title>

<style>
body{
    font-family: Arial;
    text-align: center;
    background-color: #fff8f0;
    color: black;
    transition: background-color 0.3s, color 0.3s;
    margin: 0;
    padding: 0;
}

#top{
    color: #d35400;
    margin-top: 40px;
}

/* Kitchen button (TOP LEFT) */
#kitchenBtn {
    position: fixed;
    top: 20px;
    left: 20px;
    background-color: orange;
    color: white;
}

/* Login buttons (TOP RIGHT) */
#authButtons {
    position: fixed;
    top: 20px;
    right: 20px;
}

#authButtons button {
    padding: 6px 12px;
    font-size: 12px;
}

/* Main section */
#middle{
    margin-top: 120px;
}

/* Buttons */
button{
    padding: 10px 20px;
    margin: 10px;
    cursor: pointer;
    border-radius: 5px;
    border: none;
    transition: background-color 0.3s, color 0.3s;
}

.main-btn {
    padding: 12px 25px;
    font-size: 15px;
    border-radius: 8px;
    background-color: #e67e22;
    color: white;
}

.main-btn:hover {
    background-color: #d35400;
}

/* Dark mode button */
#darkModeBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background-color: #555;
    color: white;
}

/* Dark mode styles */
.dark-mode {
    background-color: #1e1e1e;
    color: #f5f5f5;
}

.dark-mode button {
    background-color: #777;
    color: white;
}

.dark-mode button:hover {
    background-color: #555;
}

.dark-mode #top {
    color: #ffa94d;
}

/* Inputs */
input{
    padding: 5px;
    margin: 5px;
    border-radius: 3px;
    border: 1px solid #ccc;
}

.dark-mode input{
    background-color: #333;
    color: #f5f5f5;
    border: 1px solid #555;
}
</style>
</head>

<body>

<!-- Kitchen button -->
<button id="kitchenBtn" onclick="goKitchen()">Kitchen</button>

<!-- Login / Signup (TOP RIGHT) -->
<div id="authButtons">
    <button onclick="showLogin()">Log In</button>
    <button onclick="showSignup()">Sign Up</button>
</div>

<h1 id="top">🍴 Home Kitchen Hub</h1>
<p>Simple and delicious recipes you can make at home.</p>

<div id="middle">

    <h2>🔥 Featured Recipes</h2>
    <ul style="list-style: none; padding: 0;">
        <li>Pasta</li>
        <li>Chicken Rice</li>
        <li>Chocolate Cake</li>
    </ul>

    <br>

    <a href="kitchen.html">
        <button class="main-btn">View All Recipes</button>
    </a>

</div>

<p id="message"></p>

<button id="darkModeBtn" onclick="toggleDarkMode()">Toggle Dark Mode</button>

<script>
function goKitchen(){
    window.location.href = "kitchen.html";
}

function showSignup(){
    document.getElementById("middle").innerHTML = `
        <div>
            <h2>Create Account</h2>
            <p>Username:</p>
            <input id="suUser"><br><br>
            <p>Password:</p>
            <input id="suPass" type="password"><br><br>
            <button onclick="createAccount()">Create</button>
            <button onclick="resetHome()">Back</button>
        </div>
    `;
}

function showLogin(){
    document.getElementById("middle").innerHTML = `
        <div>
            <h2>Log In</h2>
            <p>Username:</p>
            <input id="liUser"><br><br>
            <p>Password:</p>
            <input id="liPass" type="password"><br><br>
            <button onclick="login()">Log In</button>
            <button onclick="resetHome()">Back</button>
        </div>
    `;
}

function createAccount(){
    const user = document.getElementById("suUser").value;
    const pass = document.getElementById("suPass").value;

    if(!user || !pass){
        document.getElementById("message").innerText = "Please fill all fields!";
        return;
    }

    localStorage.setItem("username", user);
    localStorage.setItem("password", pass);

    document.getElementById("message").innerText = "Account created!";
    resetHome();
}

function login(){
    const user = document.getElementById("liUser").value;
    const pass = document.getElementById("liPass").value;

    const savedUser = localStorage.getItem("username");
    const savedPass = localStorage.getItem("password");

    if(user === savedUser && pass === savedPass){
        document.getElementById("message").innerText = "Welcome " + user + "!";
    } else {
        document.getElementById("message").innerText = "Wrong username or password";
    }

    resetHome();
}

function resetHome(){
    document.getElementById("middle").innerHTML = `
        <h2>🔥 Featured Recipes</h2>
        <ul style="list-style: none; padding: 0;">
            <li>Pasta</li>
            <li>Chicken Rice</li>
            <li>Chocolate Cake</li>
        </ul>
        <br>
        <a href="kitchen.html">
            <button class="main-btn">View All Recipes</button>
        </a>
    `;
}

function toggleDarkMode() {
    const body = document.body;
    const btn = document.getElementById("darkModeBtn");

    body.classList.toggle("dark-mode");

    const isDark = body.classList.contains("dark-mode");
    localStorage.setItem("darkMode", isDark);

    btn.innerText = isDark ? "Light Mode" : "Dark Mode";
}

window.onload = function(){
    const isDark = localStorage.getItem("darkMode") === "true";
    const btn = document.getElementById("darkModeBtn");

    if(isDark){
        document.body.classList.add("dark-mode");
        btn.innerText = "Light Mode";
    }
}
</script>

</body>
</html>
